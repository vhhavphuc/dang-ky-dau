<!DOCTYPE html>
<html>

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">

    <title>Fuel Management Dashboard</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels"></script>

    <style>
        body {
            font-family: Segoe UI;
            background: linear-gradient(120deg, #1e3c72, #2a5298);
            margin: 0;
            padding: 30px;
            color: #333;
        }

        .container {
            max-width: 1400px;
            margin: auto;
        }

        h2 {
            color: white;
            margin-bottom: 20px;
        }

        .card {
            background: white;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 12px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.2);
            overflow-x: auto;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            align-items: stretch;
        }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat {
            background: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.15);
        }

        .stat h3 {
            margin: 0;
            font-size: 26px;
            color: #2a5298;
        }

        .stat p {
            margin: 5px;
            font-size: 13px;
        }

        label {
            display: block;
            margin-bottom: 4px;
            font-weight: 600;
        }

        input,
        select {
            width: 100%;
            max-width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
            box-sizing: border-box;
        }

        button {
            background: #2a5298;
            color: white;
            border: none;
            padding: 10px 14px;
            border-radius: 6px;
            cursor: pointer;
            margin-right: 5px;
        }

        button:hover {
            background: #1e3c72;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
        }

        tbody {
            display: block;
            max-height: 400px;
            overflow-y: auto;
        }

        thead, tbody tr {
            display: table;
            width: 100%;
            table-layout: fixed;
        }

        th {
            background: #2a5298;
            color: white;
        }

        th,
        td {
            padding: 8px;
            border-bottom: 1px solid #ddd;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
    </style>

</head>

<body>

    <div class="container">

        <h2>⛽ BẢNG TỔNG HỢP THEO DÕI LÃNH DẦU DIEZEN QLK</h2>

        <div class="dashboard">

            <div class="stat">
                <h3 id="totalFuel">0</h3>
                <p>Tổng lít dầu</p>
            </div>

            <div class="stat">
                <h3 id="totalTrips">0</h3>
                <p>Số lần lấy dầu</p>
            </div>

            <div class="stat">
                <h3 id="topCar">-</h3>
                <p>Xe tiêu thụ nhiều nhất</p>
            </div>

            <div class="stat">
                <h3 id="avgFuel">0</h3>
                <p>Trung bình lít/lần</p>
            </div>

        </div>

        <div class="card">

            <h3>Đăng ký lấy dầu</h3>

            <form id="fuelForm">

                <input id="plateNumber" list="plateNumbers" placeholder="Biển số xe" required>
                <datalist id="plateNumbers">
                    <option value="88LD-00031">
                    <option value="88LD-0093">
                    <option value="88LD-01303">
                    <option value="88LD-0354">
                    <option value="XN02">
                    <option value="XN03">
                    <option value="XN04">
                    <option value="XN05">
                    <option value="XN06">
                    <option value="88B-10262">
                    <option value="88A-84182">
                    <option value="88A-83790">
                    <option value="88A-75215">
                    <option value="88B-10174">
                    <option value="88A-84130">
                    <option value="88B-10048">
                    <option value="88B-10047">
                    <option value="88A-84590">
                </datalist>

                <input id="driverName" placeholder="Tên lái xe" required>
                <input id="fuelAmount" type="number" placeholder="Số lít" required>
                <input id="fuelDate" type="date" required>

                <label id="prevKmLabel">Số Km cuối ngày <span id="prevKmDate"></span></label>
                <input id="prevKm" type="number" placeholder="Nhập Km cuối ngày" required>

                <button>Đăng ký</button>

            </form>

        </div>

        <div class="card">

            <h3>Bộ lọc dữ liệu</h3>

            <label>Ngày bắt đầu</label>
            <input type="date" id="startDate">

            <label>Ngày kết thúc</label>
            <input type="date" id="endDate">

            <input id="filterCar" list="filterPlateNumbers" placeholder="Tất cả xe">
            <datalist id="filterPlateNumbers">
                <option value="">
                <option value="88LD-00031">
                <option value="88LD-0093">
                <option value="88LD-01303">
                <option value="88LD-0354">
                <option value="XN02">
                <option value="XN03">
                <option value="XN04">
                <option value="XN05">
                <option value="XN06">
                <option value="88B-10262">
                <option value="88A-84182">
                <option value="88A-83790">
                <option value="88A-75215">
                <option value="88B-10174">
                <option value="88A-84130">
                <option value="88B-10048">
                <option value="88B-10047">
                <option value="88A-84590">
            </datalist>

            <button onclick="applyFilter()">Lọc</button>
            <button onclick="filterToday()">Hôm nay</button>
            <button onclick="clearFilter()">Bỏ lọc</button>
            <button onclick="exportExcel()">Xuất Excel</button>
            <button onclick="exportPivot()">Xuất Pivot</button>

        </div>

        <div class="card">

            <h3>Lịch sử</h3>

            <table>

                <thead>
                    <tr>
                        <th>STT</th>
                        <th>Ngày</th>
                        <th>Xe</th>
                        <th>Lái xe</th>
                        <th>Lít</th>
                        <th>Km cuối ngày</th>
                        <th>Thời gian tạo</th>
                    </tr>
                </thead>

                <tbody id="recordsTable"></tbody>

            </table>

        </div>

        <div class="grid">

            <div class="card">
                <h3>Biểu đồ theo ngày</h3>
                <canvas id="chartDay"></canvas>
            </div>

            <div class="card">
                <h3>Top xe tiêu thụ</h3>
                <canvas id="chartCar"></canvas>
            </div>

        </div>

        <div class="card">

            <h3>Xu hướng theo tháng</h3>
            <canvas id="chartMonth"></canvas>

        </div>

        <div class="card">

            <h3>Pivot theo tháng</h3>

            <table>
                <thead id="pivotHead"></thead>
                <tbody id="pivotBody"></tbody>
            </table>

        </div>

    </div>

    <script>

        const API = "https://script.google.com/macros/s/AKfycbws3C_yR1yb4Q1l2MTR3K_Fv1j_0PBht8eRSZnuP7cJOndQY3QSzEhnB3-UsWBei1Ic/exec";

        function formatDateLocal(date) {

            let y = date.getFullYear();
            let m = String(date.getMonth() + 1).padStart(2, '0');
            let d = String(date.getDate()).padStart(2, '0');

            return y + "-" + m + "-" + d;

        }

        // Explicit DOM references (avoid relying on global element variables)
        const fuelForm = document.getElementById("fuelForm");
        const plateNumber = document.getElementById("plateNumber");
        const driverName = document.getElementById("driverName");
        const fuelAmount = document.getElementById("fuelAmount");
        const fuelDate = document.getElementById("fuelDate");
        const prevKm = document.getElementById("prevKm");
        const prevKmDate = document.getElementById("prevKmDate");
        const prevKmLabel = document.getElementById("prevKmLabel");
        const startDate = document.getElementById("startDate");
        const endDate = document.getElementById("endDate");
        const filterCar = document.getElementById("filterCar");

        let allRecords = [];
        let filteredRecords = [];
        let chartDay;
        let chartCar;
        let chartMonth;
        fuelDate.valueAsDate = new Date();

        function updatePrevKmDate() {
            const dateValue = fuelDate.value || formatDateLocal(new Date());
            const d = new Date(dateValue);
            d.setDate(d.getDate() - 1);
            const prevDate = formatDateLocal(d);

            prevKmDate.innerText = prevDate;
            prevKm.placeholder = "Km cuối ngày " + prevDate;

            updatePrevKmRequirement();
        }

        function updatePrevKmRequirement() {
            const isXn = plateNumber.value.startsWith("XN");

            if (isXn) {
                prevKm.required = false;
                prevKmLabel.innerHTML = `Số Km cuối ngày <span id="prevKmDate"></span> (không bắt buộc)`;
            } else {
                prevKm.required = true;
                prevKmLabel.innerHTML = `Số Km cuối ngày <span id="prevKmDate"></span>`;
            }

            // Keep the date text synced after changing innerHTML
            prevKmDate.innerText = new Date(new Date(fuelDate.value || formatDateLocal(new Date())).setDate(new Date(fuelDate.value || formatDateLocal(new Date())).getDate() - 1)).toISOString().slice(0, 10);
        }

        fuelDate.addEventListener("change", updatePrevKmDate);
        plateNumber.addEventListener("change", updatePrevKmRequirement);
        updatePrevKmDate();

        const now = new Date();
        const firstDay = new Date(now.getFullYear(), now.getMonth(), 1).toISOString().slice(0, 10);
        const lastDay = new Date(now.getFullYear(), now.getMonth() + 1, 0).toISOString().slice(0, 10);

        startDate.value = firstDay;
        endDate.value = lastDay;

        function jsonp(url, callback) {

            const script = document.createElement("script");

            window[callback] = function (data) {

                delete window[callback];
                script.remove();

                handle(callback, data);

            };

            script.src = url + "&callback=" + callback;

            document.body.appendChild(script);

        }

        function handle(cb, data) {

            if (cb === "load") {

                allRecords = data.map(r => ({

                    stt: r.stt,
                    plateNumber: r.plateNumber,
                    driverName: r.driverName,
                    fuelAmount: Number(r.fuelAmount) || 0,
                    date: r.date,
                    createdAt: r.createdAt,
                    endKm: Number(r.endKm) || 0

                }));

                applyFilter();

            }

            if (cb === "add") {

                alert(data.message);

                driverName.value = "";
                fuelAmount.value = "";

                load();

            }

        }

        function load() {
            jsonp(API + "?action=getRecords", "load");
        }

        function filterToday() {

            let today = new Date().toISOString().slice(0, 10);

            startDate.value = today;
            endDate.value = today;

            applyFilter();

        }

        function clearFilter() {

            startDate.value = firstDay;
            endDate.value = lastDay;
            filterCar.value = "";

            applyFilter();

        }

        function applyFilter() {

            const start = startDate.value;
            const end = endDate.value;
            const car = filterCar.value;

            filteredRecords = allRecords.filter(r => {

                let d = r.date;

                let okDate = (!start || d >= start) && (!end || d <= end);
                let okCar = (car == "" || r.plateNumber === car);

                return okDate && okCar;

            }).sort((a, b) => {
                if (a.date > b.date) return 1;
                if (a.date < b.date) return -1;
                return a.stt - b.stt;
            });

            render(filteredRecords);
            buildCharts(filteredRecords);
            buildMonthChart(filteredRecords);
            buildPivot(filteredRecords);
            updateStats(filteredRecords);

        }

        function render(data) {

            recordsTable.innerHTML = "";

            data.forEach(r => {

                let d = new Date(r.date).toISOString().slice(0, 10);

                recordsTable.innerHTML += `
<tr>
<td>${r.stt}</td>
<td>${d}</td>
<td>${r.plateNumber}</td>
<td>${r.driverName}</td>
<td>${r.fuelAmount}</td>
<td>${r.endKm}</td>
<td>${formatDateTime(r.createdAt)}</td>
</tr>
`;

            });

        }

        function updateStats(data) {

            let totalFuel = 0;
            let carTotal = {};

            data.forEach(r => {

                totalFuel += Number(r.fuelAmount) || 0;

                if (!carTotal[r.plateNumber]) carTotal[r.plateNumber] = 0;

                carTotal[r.plateNumber] += Number(r.fuelAmount) || 0;

            });

            let topCar = "-";
            let max = 0;

            for (let c in carTotal) {

                if (carTotal[c] > max) {
                    max = carTotal[c];
                    topCar = c;
                }

            }

            document.getElementById("totalFuel").innerText = totalFuel;
            document.getElementById("totalTrips").innerText = data.length;
            document.getElementById("avgFuel").innerText = (data.length ? (totalFuel / data.length).toFixed(1) : 0);
            document.getElementById("topCar").innerText = topCar;

        }

        function buildCharts(data) {

            let day = {};
            let car = {};

            data.forEach(r => {

                let d = new Date(r.date).toISOString().slice(0, 10);

                day[d] = (day[d] || 0) + Number(r.fuelAmount || 0);
                car[r.plateNumber] = (car[r.plateNumber] || 0) + Number(r.fuelAmount || 0);

            });

            if (chartDay) chartDay.destroy();
            if (chartCar) chartCar.destroy();

            chartDay = new Chart(document.getElementById("chartDay"), {

                type: "line",

                data: {
                    labels: Object.keys(day),
                    datasets: [{
                        label: "Lít",
                        data: Object.values(day),
                        borderColor: "#2a5298"
                    }]
                },

                options: {
                    plugins: {
                        datalabels: {
                            color: "red",
                            font: {
                                size: 16,
                                weight: "bold"
                            },
                            anchor: "end",
                            align: "top",
                            formatter: (v) => v
                        }
                    }
                },

                plugins: [ChartDataLabels]

            });

            chartCar = new Chart(document.getElementById("chartCar"), {

                type: "bar",

                data: {
                    labels: Object.keys(car),
                    datasets: [{
                        label: "Lít",
                        data: Object.values(car),
                        backgroundColor: "#2a5298"
                    }]
                },

                options: {
                    plugins: {
                        datalabels: {
                            color: "red",
                            font: {
                                weight: "bold",
                                size: 16
                            },
                            anchor: "end",
                            align: "top"
                        }
                    }
                },

                plugins: [ChartDataLabels]

            });

        }

        function buildMonthChart(data) {

            let month = {};

            data.forEach(r => {

                let d = new Date(r.date);
                let m = d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, '0');

                month[m] = (month[m] || 0) + Number(r.fuelAmount || 0);

            });

            if (chartMonth) chartMonth.destroy();

            chartMonth = new Chart(document.getElementById("chartMonth"), {

                type: "line",

                data: {
                    labels: Object.keys(month),
                    datasets: [{
                        label: "Lít dầu",
                        data: Object.values(month),
                        borderColor: "#ff6600",
                        backgroundColor: "rgba(255,102,0,0.2)",
                        fill: true
                    }]
                },

                options: {
                    plugins: {
                        datalabels: {
                            color: "red",
                            font: {
                                size: 16,
                                weight: "bold"
                            },
                            anchor: "end",
                            align: "top",
                            formatter: (v) => v
                        }
                    }
                },

                plugins: [ChartDataLabels]

            });

        }

        function formatDateTime(date) {

            let d = new Date(date);

            let y = d.getFullYear();
            let m = String(d.getMonth() + 1).padStart(2, '0');
            let day = String(d.getDate()).padStart(2, '0');

            let h = String(d.getHours()).padStart(2, '0');
            let min = String(d.getMinutes()).padStart(2, '0');

            return y + "-" + m + "-" + day + " " + h + ":" + min;

        }

        function buildPivot(data) {

            let months = new Set();
            let cars = new Set();
            let map = {};

            data.forEach(r => {

                let d = new Date(r.date);
                let m = d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, '0');

                months.add(m);
                cars.add(r.plateNumber);

                if (!map[r.plateNumber]) map[r.plateNumber] = {};

                map[r.plateNumber][m] = (map[r.plateNumber][m] || 0) + Number(r.fuelAmount);

            });

            months = [...months].sort();
            cars = [...cars].sort();

            pivotHead.innerHTML = "<tr><th>Xe</th>" + months.map(m => "<th>" + m + "</th>").join("") + "<th>Tổng</th></tr>";

            let html = "";

            cars.forEach(car => {

                let total = 0;

                let row = "<tr><td>" + car + "</td>";

                months.forEach(m => {

                    let v = (map[car] && map[car][m]) ? map[car][m] : 0;

                    row += "<td>" + v + "</td>";

                    total += v;

                });

                row += "<td>" + total + "</td></tr>";

                html += row;

            });

            pivotBody.innerHTML = html;

        }

        function exportExcel() {

            let csv = "Date,Car,Driver,Liters,Km\n";

            filteredRecords.forEach(r => {

                let d = new Date(r.date).toISOString().slice(0, 10);

                csv += d + "," + r.plateNumber + "," + r.driverName + "," + r.fuelAmount + "," + r.endKm + "\n";

            });

            const blob = new Blob([csv]);
            const a = document.createElement("a");

            a.href = URL.createObjectURL(blob);
            a.download = "fuel_report.csv";
            a.click();

        }

        function exportPivot() {

            let months = new Set();
            let cars = new Set();

            filteredRecords.forEach(r => {

                let d = new Date(r.date);
                let month = d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, '0');

                months.add(month);
                cars.add(r.plateNumber);

            });

            months = [...months].sort();
            cars = [...cars].sort();

            let map = {};

            filteredRecords.forEach(r => {

                let d = new Date(r.date);
                let month = d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, '0');

                if (!map[r.plateNumber]) map[r.plateNumber] = {};

                map[r.plateNumber][month] = (map[r.plateNumber][month] || 0) + Number(r.fuelAmount);

            });

            let csv = "Xe," + months.join(",") + ",Tong\n";

            cars.forEach(car => {

                let row = [car];
                let total = 0;

                months.forEach(m => {

                    let v = (map[car] && map[car][m]) ? map[car][m] : 0;

                    row.push(v);
                    total += v;

                });

                row.push(total);

                csv += row.join(",") + "\n";

            });

            const blob = new Blob([csv]);
            const a = document.createElement("a");

            a.href = URL.createObjectURL(blob);
            a.download = "fuel_pivot_report.csv";
            a.click();

        }

        fuelForm.addEventListener("submit", function (e) {

            e.preventDefault();

            const isXn = plateNumber.value.startsWith("XN");

            if (!isXn && !prevKm.value) {
                alert("Vui lòng nhập Số Km cuối ngày " + prevKmDate.innerText + " trước khi đăng ký.");
                prevKm.focus();
                return;
            }

            if (Number(fuelAmount.value) <= 0) {
                alert("Số lít phải lớn hơn 0.");
                fuelAmount.focus();
                return;
            }

            const data = {
                plateNumber: plateNumber.value,
                driverName: driverName.value,
                fuelAmount: fuelAmount.value,
                date: fuelDate.value,
                prevKm: prevKm.value
            };

            jsonp(API + "?action=add&data=" + encodeURIComponent(JSON.stringify(data)), "add");

        });

        load();

    </script>

</body>

</html>
